<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" width="300" height="80">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brain/Neural Network Icon -->
  <g>
    <!-- Central brain circle -->
    <circle cx="30" cy="40" r="24" fill="url(#gradient1)" opacity="0.9"/>

    <!-- Inner brain detail -->
    <g stroke="white" stroke-width="1.5" fill="none" opacity="0.8">
      <!-- Brain waves -->
      <path d="M 18 40 Q 22 35, 26 40 T 34 40" stroke-width="1.2"/>
      <path d="M 18 48 Q 22 43, 26 48 T 34 48" stroke-width="1.2"/>

      <!-- Neural connections -->
      <circle cx="20" cy="35" r="2" fill="white"/>
      <circle cx="30" cy="32" r="2" fill="white"/>
      <circle cx="40" cy="36" r="2" fill="white"/>
      <circle cx="20" cy="50" r="2" fill="white"/>
      <circle cx="30" cy="52" r="2" fill="white"/>
      <circle cx="40" cy="48" r="2" fill="white"/>

      <!-- Connection lines -->
      <line x1="20" y1="35" x2="30" y2="32" stroke="white" stroke-width="0.8"/>
      <line x1="30" y1="32" x2="40" y2="36" stroke="white" stroke-width="0.8"/>
      <line x1="20" y1="50" x2="30" y2="52" stroke="white" stroke-width="0.8"/>
      <line x1="30" y1="52" x2="40" y2="48" stroke="white" stroke-width="0.8"/>
      <line x1="30" y1="32" x2="30" y2="52" stroke="white" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- Accent ring -->
    <circle cx="30" cy="40" r="24" fill="none" stroke="url(#gradient2)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Text: "Umais Siddiqui" -->
  <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="#1a1a2e">
    Umais Siddiqui
  </text>

  <!-- Text: "AI Coaching" -->
  <text x="70" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#667eea" letter-spacing="0.5">
    AI COACHING
  </text>

  <!-- Decorative accent lines -->
  <g stroke="url(#gradient2)" stroke-width="1" opacity="0.5">
    <line x1="70" y1="60" x2="130" y2="60"/>
  </g>
</svg>
