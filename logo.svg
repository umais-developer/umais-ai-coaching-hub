<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main geometric shape - modern AI circuit design -->
  <g filter="url(#shadow)">
    <!-- Outer circle background -->
    <circle cx="50" cy="50" r="48" fill="none" stroke="url(#mainGradient)" stroke-width="1" opacity="0.3"/>

    <!-- Central circle with gradient -->
    <circle cx="50" cy="50" r="38" fill="url(#mainGradient)" opacity="0.95"/>

    <!-- Inner accent circle -->
    <circle cx="50" cy="50" r="32" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7"/>

    <!-- Top accent element - neural node -->
    <circle cx="50" cy="25" r="4" fill="url(#accentGradient)"/>
    <line x1="50" y1="29" x2="50" y2="38" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>

    <!-- Left accent element -->
    <circle cx="28" cy="50" r="3.5" fill="url(#accentGradient)"/>
    <line x1="31.5" y1="50" x2="40" y2="50" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>

    <!-- Right accent element -->
    <circle cx="72" cy="50" r="3.5" fill="url(#accentGradient)"/>
    <line x1="68.5" y1="50" x2="60" y2="50" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>

    <!-- Bottom accent element -->
    <circle cx="50" cy="75" r="4" fill="url(#accentGradient)"/>
    <line x1="50" y1="71" x2="50" y2="62" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>

    <!-- Central neural pattern - abstract brain/circuit design -->
    <g opacity="0.85">
      <!-- Upper wave -->
      <path d="M 38 45 Q 42 40 46 45 Q 50 50 54 45 Q 58 40 62 45"
            fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Lower wave -->
      <path d="M 38 55 Q 42 60 46 55 Q 50 50 54 55 Q 58 60 62 55"
            fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Center connection dots -->
      <circle cx="42" cy="50" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="50" cy="50" r="2" fill="white" opacity="0.95"/>
      <circle cx="58" cy="50" r="1.5" fill="white" opacity="0.9"/>
    </g>

    <!-- Decorative corner accents -->
    <circle cx="35" cy="35" r="2" fill="url(#accentGradient)" opacity="0.6"/>
    <circle cx="65" cy="35" r="2" fill="url(#accentGradient)" opacity="0.6"/>
    <circle cx="35" cy="65" r="2" fill="url(#accentGradient)" opacity="0.6"/>
    <circle cx="65" cy="65" r="2" fill="url(#accentGradient)" opacity="0.6"/>
  </g>

  <!-- Glow effect -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#mainGradient)" stroke-width="0.5" opacity="0.2" filter="url(#shadow)"/>
</svg>
